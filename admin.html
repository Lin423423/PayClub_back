<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PayClub 管理後台</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surface:#1a1d27;--card:#22263a;--accent:#4f6ef7;--green:#16a34a;--red:#dc2626;--orange:#d97706;--text:#f0f0ff;--text2:#9ca3af;--border:rgba(255,255,255,0.08);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans TC','Plus Jakarta Sans',sans-serif;min-height:100vh;}
.admin-login{max-width:400px;margin:80px auto;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:36px;}
.admin-login h2{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.4rem;font-weight:800;margin-bottom:6px;}
.admin-login p{color:var(--text2);font-size:0.85rem;margin-bottom:24px;}
.a-input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:9px;padding:11px 14px;color:var(--text);font-size:0.9rem;font-family:'Noto Sans TC',sans-serif;outline:none;margin-bottom:12px;}
.a-input:focus{border-color:var(--accent);}
.a-btn{width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:9px;font-size:0.95rem;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.a-btn:hover{background:#3a56d4;}
.a-err{color:#f87171;font-size:0.8rem;margin-top:8px;display:none;}
.admin-nav{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.admin-logo{font-family:'Plus Jakarta Sans',sans-serif;font-weight:800;font-size:1.1rem;color:var(--accent);display:flex;align-items:center;gap:8px;}
.admin-logo-badge{background:rgba(220,38,38,0.2);color:#f87171;font-size:0.68rem;font-weight:700;padding:2px 8px;border-radius:100px;letter-spacing:0.06em;}
.admin-out{background:rgba(220,38,38,0.15);border:1px solid rgba(220,38,38,0.3);color:#f87171;padding:6px 14px;border-radius:7px;font-size:0.8rem;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.content{max-width:1100px;margin:0 auto;padding:28px 20px;}
.section-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.1rem;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px;}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px 18px;}
.stat-box-label{font-size:0.7rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;}
.stat-box-val{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.7rem;font-weight:800;letter-spacing:-0.03em;}
.table-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:24px;}
.table-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.table-title{font-size:0.9rem;font-weight:700;}
.search-input{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-size:0.83rem;font-family:'Noto Sans TC',sans-serif;outline:none;width:200px;}
.search-input:focus{border-color:var(--accent);}
table{width:100%;border-collapse:collapse;}
thead th{padding:10px 18px;font-size:0.68rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:0.05em;text-align:left;background:rgba(255,255,255,0.02);border-bottom:1px solid var(--border);}
tbody tr:hover{background:rgba(255,255,255,0.02);}
tbody td{padding:12px 18px;font-size:0.84rem;border-bottom:1px solid var(--border);vertical-align:middle;}
tbody tr:last-child td{border-bottom:none;}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:100px;font-size:0.68rem;font-weight:700;}
.badge-green{background:rgba(22,163,74,0.2);color:#4ade80;}
.badge-blue{background:rgba(79,110,247,0.2);color:#818cf8;}
.badge-orange{background:rgba(217,119,6,0.2);color:#fbbf24;}
.badge-red{background:rgba(220,38,38,0.2);color:#f87171;}
.badge-gray{background:rgba(255,255,255,0.08);color:var(--text2);}
.badge-demo{background:rgba(217,119,6,0.2);color:#fbbf24;}
.del-btn{background:rgba(220,38,38,0.15);border:1px solid rgba(220,38,38,0.3);color:#f87171;padding:4px 10px;border-radius:6px;font-size:0.72rem;font-weight:700;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.del-btn:hover{background:rgba(220,38,38,0.25);}
.refresh-btn{background:rgba(255,255,255,0.06);border:1px solid var(--border);color:var(--text2);padding:6px 14px;border-radius:7px;font-size:0.8rem;font-weight:600;cursor:pointer;font-family:'Noto Sans TC',sans-serif;}
.refresh-btn:hover{background:rgba(255,255,255,0.1);}
.log-row{display:flex;align-items:center;gap:12px;padding:9px 18px;border-bottom:1px solid var(--border);font-size:0.82rem;}
.log-row:last-child{border-bottom:none;}
.log-time{color:var(--text2);font-size:0.75rem;min-width:140px;flex-shrink:0;}
.log-action{font-weight:600;}
.log-user{color:var(--accent);font-size:0.8rem;}
.empty-log{text-align:center;padding:32px;color:var(--text2);font-size:0.85rem;}
.toast{position:fixed;bottom:20px;right:20px;background:#22263a;border:1px solid var(--border);color:var(--text);border-radius:10px;padding:11px 16px;font-size:0.84rem;transform:translateY(60px);opacity:0;transition:all 0.3s;z-index:9999;}
.toast.show{transform:translateY(0);opacity:1;}
@media(max-width:768px){.stats-row{grid-template-columns:1fr 1fr;}.search-input{width:140px;}.content{padding:20px 14px;}thead th,tbody td{padding:8px 12px;font-size:0.76rem;}}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="admin-login">
    <h2>🔐 管理後台</h2>
    <p>僅限授權管理員登入</p>
    <input type="text" id="adminUser" class="a-input" placeholder="管理員帳號" onkeydown="if(event.key==='Enter')adminLogin()">
    <input type="password" id="adminPwd" class="a-input" placeholder="管理員密碼" onkeydown="if(event.key==='Enter')adminLogin()">
    <button class="a-btn" onclick="adminLogin()">登入管理後台</button>
    <div class="a-err" id="adminErr">帳號或密碼錯誤</div>
    <div style="margin-top:16px;font-size:0.76rem;color:var(--text2);text-align:center;">預設：admin / payclub2025</div>
  </div>
</div>

<div id="adminDash" style="display:none">
  <nav class="admin-nav">
    <div class="admin-logo">PayClub <span class="admin-logo-badge">ADMIN</span></div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="refresh-btn" onclick="renderAll()">🔄 重新整理</button>
      <button class="admin-out" onclick="adminLogout()">登出</button>
    </div>
  </nav>
  <div class="content">
    <div class="stats-row">
      <div class="stat-box"><div class="stat-box-label">總註冊用戶</div><div class="stat-box-val" id="aTotal" style="color:var(--accent)">0</div></div>
      <div class="stat-box"><div class="stat-box-label">一般帳號</div><div class="stat-box-val" id="aRegular" style="color:#4ade80">0</div></div>
      <div class="stat-box"><div class="stat-box-label">DEMO 用戶</div><div class="stat-box-val" id="aDemo" style="color:#fbbf24">0</div></div>
      <div class="stat-box"><div class="stat-box-label">活動日誌筆數</div><div class="stat-box-val" id="aLogs" style="color:#a78bfa">0</div></div>
    </div>

    <div class="section-title">👥 用戶列表</div>
    <div class="table-card">
      <div class="table-header">
        <div class="table-title">所有登入用戶</div>
        <input type="text" class="search-input" placeholder="搜尋名稱或 Email" oninput="filterUsers(this.value)">
      </div>
      <table>
        <thead><tr><th>姓名</th><th>Email</th><th>成員類別</th><th>類型</th><th>首次登入</th><th>最後登入</th><th>登入次數</th><th>活動數</th><th>操作</th></tr></thead>
        <tbody id="usersBody"></tbody>
      </table>
    </div>

    <div class="section-title">🔑 已註冊帳號</div>
    <div class="table-card">
      <div class="table-header"><div class="table-title">可登入帳號（Email + 密碼）</div></div>
      <table>
        <thead><tr><th>姓名</th><th>Email</th><th>成員類別</th><th>操作</th></tr></thead>
        <tbody id="accountsBody"></tbody>
      </table>
    </div>

    <div class="section-title">🚫 封鎖名單</div>
    <div class="table-card" style="margin-bottom:24px">
      <div class="table-header"><div class="table-title">已封鎖帳號（無法登入）</div></div>
      <div id="blockedList"></div>
    </div>

    <div class="section-title">📋 活動日誌</div>
    <div class="table-card">
      <div class="table-header">
        <div class="table-title">最近 50 筆操作記錄</div>
        <button class="refresh-btn" onclick="clearLogs()">清除日誌</button>
      </div>
      <div id="logList"></div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// Role labels in Chinese
const ROLE_LABELS = {admin:'管理者', observer:'觀察者', payer:'繳費者', leader:'管理者', member:'成員'};
const ROLE_BADGE_CLASS = {admin:'badge-green', observer:'badge-gray', payer:'badge-blue', leader:'badge-green', member:'badge-gray'};

function getAdminCreds(){ const raw=localStorage.getItem('pc_admin_credentials'); return raw?JSON.parse(raw):{username:'admin',password:'payclub2025'}; }
function adminLogin(){
  const u=document.getElementById('adminUser').value.trim(),p=document.getElementById('adminPwd').value;
  const creds=getAdminCreds();
  if(u===creds.username&&p===creds.password){
    sessionStorage.setItem('pc_admin_auth','1');
    document.getElementById('loginScreen').style.display='none';
    document.getElementById('adminDash').style.display='block';
    renderAll();
  } else {
    document.getElementById('adminErr').style.display='block';
    setTimeout(()=>document.getElementById('adminErr').style.display='none',2000);
  }
}
function adminLogout(){ sessionStorage.removeItem('pc_admin_auth'); location.reload(); }
if(sessionStorage.getItem('pc_admin_auth')==='1'){
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('adminDash').style.display='block';
}

function getRegistry(){ return JSON.parse(localStorage.getItem('pc_user_registry')||'[]'); }
function getLogs(){ return JSON.parse(localStorage.getItem('pc_activity_log')||'[]'); }
function getAccounts(){ return JSON.parse(localStorage.getItem('pc_users')||'[]'); }
function getUserEvents(email){ return JSON.parse(localStorage.getItem('pc_events__'+email)||'[]'); }
let allUsers=[];

function renderAll(){
  allUsers=getRegistry();
  const logs=getLogs(),accounts=getAccounts();
  document.getElementById('aTotal').textContent=allUsers.length;
  document.getElementById('aRegular').textContent=allUsers.filter(u=>!u.isDemo).length;
  document.getElementById('aDemo').textContent=allUsers.filter(u=>u.isDemo).length;
  document.getElementById('aLogs').textContent=logs.length;
  renderUsers(allUsers); renderAccounts(accounts); renderLogs(logs.slice(0,50)); renderBlocked();
}

function roleBadge(role){
  const label = ROLE_LABELS[role]||role;
  const cls = ROLE_BADGE_CLASS[role]||'badge-gray';
  return `<span class="badge ${cls}">${label}</span>`;
}

function renderUsers(users){
  const tbody=document.getElementById('usersBody');
  if(!users.length){tbody.innerHTML='<tr><td colspan="9" style="text-align:center;padding:24px;color:var(--text2)">尚無用戶資料</td></tr>';return;}
  tbody.innerHTML=users.map(u=>{
    const evts=getUserEvents(u.email);
    const typeBadge=u.isDemo?'<span class="badge badge-demo">Demo</span>':'<span class="badge badge-blue">一般</span>';
    const created=u.createdAt?new Date(u.createdAt).toLocaleString('zh-TW',{dateStyle:'short',timeStyle:'short'}):'—';
    const last=u.lastLogin?new Date(u.lastLogin).toLocaleString('zh-TW',{dateStyle:'short',timeStyle:'short'}):'—';
    return `<tr>
      <td style="font-weight:600">${u.name}</td>
      <td style="color:var(--text2);font-size:0.78rem">${u.email}</td>
      <td>${roleBadge(u.role)}</td>
      <td>${typeBadge}</td>
      <td style="color:var(--text2);font-size:0.76rem">${created}</td>
      <td style="color:var(--text2);font-size:0.76rem">${last}</td>
      <td style="font-weight:700;color:var(--accent)">${u.loginCount||1}</td>
      <td>${evts.length}</td>
      <td><button class="del-btn" onclick="deleteUser('${u.email}')">刪除</button></td>
    </tr>`;
  }).join('');
}

function filterUsers(q){ if(!q){renderUsers(allUsers);return;} renderUsers(allUsers.filter(u=>u.name.includes(q)||u.email.includes(q))); }

function renderAccounts(accounts){
  const tbody=document.getElementById('accountsBody');
  if(!accounts.length){tbody.innerHTML='<tr><td colspan="4" style="text-align:center;padding:24px;color:var(--text2)">尚無已註冊帳號</td></tr>';return;}
  tbody.innerHTML=accounts.map((a,i)=>`<tr>
    <td style="font-weight:600">${a.name}</td>
    <td style="color:var(--text2);font-size:0.78rem">${a.email}</td>
    <td>${roleBadge(a.role)}</td>
    <td><button class="del-btn" onclick="deleteAccount(${i})">刪除帳號</button></td>
  </tr>`).join('');
}

const ACTION_LABELS={login:'登入',logout:'登出',logout_demo:'Demo 登出（資料清除）',view_dashboard:'查看儀表板'};
function renderLogs(logs){
  const el=document.getElementById('logList');
  if(!logs.length){el.innerHTML='<div class="empty-log">尚無活動記錄</div>';return;}
  el.innerHTML=logs.map(l=>{
    const t=new Date(l.time).toLocaleString('zh-TW',{dateStyle:'short',timeStyle:'medium'});
    const c=l.action.includes('logout')?'#f87171':l.action==='login'?'#4ade80':'var(--text)';
    return `<div class="log-row"><div class="log-time">${t}</div><div class="log-action" style="color:${c}">${ACTION_LABELS[l.action]||l.action}</div><div class="log-user">${l.name} (${l.email})</div></div>`;
  }).join('');
}

function renderBlocked(){
  const blocked=JSON.parse(localStorage.getItem('pc_blocked_emails')||'[]');
  const el=document.getElementById('blockedList');
  if(!el)return;
  if(!blocked.length){el.innerHTML='<div style="padding:16px;text-align:center;color:var(--text2);font-size:0.84rem;">目前沒有封鎖的帳號</div>';return;}
  el.innerHTML=blocked.map(email=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:11px 20px;border-bottom:1px solid var(--border);font-size:0.84rem;">
      <div><span style="font-weight:600">${email}</span> <span class="badge badge-red">已封鎖</span></div>
      <button class="del-btn" style="background:rgba(22,163,74,0.15);border-color:#4ade80;color:#4ade80;" onclick="unblockEmail('${email}')">解除封鎖</button>
    </div>`).join('');
}

function deleteUser(email){
  if(!confirm('確定刪除用戶「'+email+'」的所有資料？'))return;
  localStorage.setItem('pc_user_registry',JSON.stringify(getRegistry().filter(u=>u.email!==email)));
  localStorage.removeItem('pc_events__'+email);
  localStorage.setItem('pc_users',JSON.stringify(getAccounts().filter(u=>u.email!==email)));
  const blocked=JSON.parse(localStorage.getItem('pc_blocked_emails')||'[]');
  if(!blocked.includes(email))blocked.push(email);
  localStorage.setItem('pc_blocked_emails',JSON.stringify(blocked));
  const logs=getLogs();logs.unshift({email:'admin',name:'管理員',action:'delete_user ('+email+')',time:new Date().toISOString()});
  localStorage.setItem('pc_activity_log',JSON.stringify(logs));
  showToast('已刪除並封鎖 '+email);renderAll();
}

function deleteAccount(idx){
  const accts=getAccounts();const email=accts[idx].email;const name=accts[idx].name;
  if(!confirm('確定刪除帳號「'+name+'」？'))return;
  accts.splice(idx,1);localStorage.setItem('pc_users',JSON.stringify(accts));
  const blocked=JSON.parse(localStorage.getItem('pc_blocked_emails')||'[]');
  if(!blocked.includes(email))blocked.push(email);
  localStorage.setItem('pc_blocked_emails',JSON.stringify(blocked));
  showToast('已刪除並封鎖 '+name);renderAll();
}

function unblockEmail(email){
  const blocked=JSON.parse(localStorage.getItem('pc_blocked_emails')||'[]');
  localStorage.setItem('pc_blocked_emails',JSON.stringify(blocked.filter(e=>e!==email)));
  showToast('已解除封鎖 '+email);renderAll();
}

function clearLogs(){ if(!confirm('確定清除所有活動日誌？'))return;localStorage.removeItem('pc_activity_log');showToast('日誌已清除');renderAll(); }
function showToast(msg){ const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2500); }
setInterval(()=>{if(sessionStorage.getItem('pc_admin_auth')==='1')renderAll();},30000);
</script>
</body></html>
